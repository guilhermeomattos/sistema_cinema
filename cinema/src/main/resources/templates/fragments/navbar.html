<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
      🎬 CinemaSystem
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/filmes}">🎞 Filmes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/clientes}">👤 Clientes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/salas}">🏛 Salas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/sessoes}">🕐 Sessões</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/reservas}">🎟 Reservas</a>
        </li>
      </ul>
      <div class="d-flex align-items-center text-white me-2">
        <small>Olá, <strong sec:authentication="name">usuário</strong></small>
      </div>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
      </form>
    </div>
  </div>
</nav>
</body>
</html>
