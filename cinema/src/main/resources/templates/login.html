<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CinemaSystem</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">


<div class="card bg-secondary text-light shadow-lg border-0" style="width: 100%; max-width: 400px;">
  <div class="card-body p-4">

    <div class="text-center mb-4">
      <span class="fs-1">🎬</span>
      <h1 class="h4 mt-2 fw-bold">Cine+</h1>
      <p class="text-light">Faça login para continuar</p>
    </div>

    <!-- Alertas padronizados do Bootstrap -->
    <div th:if="${param.erro}" class="alert alert-danger p-2 text-center small">
      ❌ Usuário ou senha incorretos.
    </div>
    <div th:if="${param.logout}" class="alert alert-success p-2 text-center small">
      ✅ Logout realizado com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label for="username" class="form-label small">Usuário</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Digite seu usuário" required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label small">Senha</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Digite sua senha" required>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold">Entrar</button>
    </form>

  </div>
</div>

</body>
</html>
