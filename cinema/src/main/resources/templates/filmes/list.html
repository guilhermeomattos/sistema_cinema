<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Filmes - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>🎞 Filmes</h2>
      <a th:href="@{/filmes/novo}" class="btn btn-dark">+ Novo Filme</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr><th>#</th><th>Título</th><th>Gênero</th><th>Dur.</th><th>Classif.</th><th>Cartaz</th><th>Ações</th></tr>
          </thead>
          <tbody>
            <tr th:each="f : ${filmes}">
              <td th:text="${f.id}"></td>
              <td th:text="${f.titulo}"></td>
              <td th:text="${f.genero}"></td>
              <td th:text="${f.duracao} + ' min'"></td>
              <td><span class="badge bg-secondary" th:text="${f.classificacao}"></span></td>
              <td>
                <span th:class="${f.emCartaz} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${f.emCartaz} ? 'Sim' : 'Não'"></span>
              </td>
              <td>
                <a th:href="@{/filmes/{id}/editar(id=${f.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                <form th:action="@{/filmes/{id}/deletar(id=${f.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remover filme?')">
                  <button class="btn btn-sm btn-outline-danger">Remover</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(filmes)}">
              <td colspan="7" class="text-center text-muted py-3">Nenhum filme cadastrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
