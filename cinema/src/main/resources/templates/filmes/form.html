<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Filme - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card shadow-sm" style="max-width:650px;">
      <div class="card-header bg-dark text-white">
        <span th:text="${filmeId != null} ? 'Editar Filme' : 'Novo Filme'">Filme</span>
      </div>
      <div class="card-body">
        <form th:action="${filmeId != null} ? @{/filmes/{id}/editar(id=${filmeId})} : @{/filmes}"
              th:object="${filme}" method="post">

          <div class="mb-3">
            <label class="form-label fw-semibold">Título *</label>
            <input type="text" th:field="*{titulo}" class="form-control"
                   th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{titulo}"></div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Gênero *</label>
              <input type="text" th:field="*{genero}" class="form-control"
                     th:classappend="${#fields.hasErrors('genero')} ? 'is-invalid'">
              <div class="invalid-feedback" th:errors="*{genero}"></div>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-semibold">Duração (min) *</label>
              <input type="number" th:field="*{duracao}" class="form-control"
                     th:classappend="${#fields.hasErrors('duracao')} ? 'is-invalid'">
              <div class="invalid-feedback" th:errors="*{duracao}"></div>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-semibold">Classificação *</label>
              <select th:field="*{classificacao}" class="form-select">
                <option value="">Selecione</option>
                <option value="L">Livre</option>
                <option value="10">10 anos</option>
                <option value="12">12 anos</option>
                <option value="14">14 anos</option>
                <option value="16">16 anos</option>
                <option value="18">18 anos</option>
              </select>
              <div class="invalid-feedback" th:errors="*{classificacao}"></div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Sinopse</label>
            <textarea th:field="*{sinopse}" class="form-control" rows="3"></textarea>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{emCartaz}" class="form-check-input" id="emCartaz">
            <label class="form-check-label" for="emCartaz">Em Cartaz</label>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Salvar</button>
            <a th:href="@{/filmes}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
