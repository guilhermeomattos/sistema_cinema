<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Sessão - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card shadow-sm" style="max-width:550px;">
      <div class="card-header bg-dark text-white">Nova Sessão</div>
      <div class="card-body">
        <form th:action="@{/sessoes}" th:object="${sessao}" method="post">

          <div class="mb-3">
            <label class="form-label fw-semibold">Filme (em cartaz) *</label>
            <select th:field="*{filmeId}" class="form-select"
                    th:classappend="${#fields.hasErrors('filmeId')} ? 'is-invalid'">
              <option value="">Selecione um filme</option>
              <option th:each="f : ${filmes}" th:value="${f.id}" th:text="${f.titulo}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{filmeId}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Sala *</label>
            <select th:field="*{salaId}" class="form-select"
                    th:classappend="${#fields.hasErrors('salaId')} ? 'is-invalid'">
              <option value="">Selecione uma sala</option>
              <option th:each="s : ${salas}"
                      th:value="${s.id}"
                      th:text="'Sala ' + ${s.numero} + ' (' + ${s.tipo} + ' - ' + ${s.capacidade} + ' lugares)'">
              </option>
            </select>
            <div class="invalid-feedback" th:errors="*{salaId}"></div>
          </div>

          <div class="row">
            <div class="col-md-7 mb-3">
              <label class="form-label fw-semibold">Data e Hora *</label>
              <input type="datetime-local" th:field="*{dataHora}" class="form-control"
                     th:classappend="${#fields.hasErrors('dataHora')} ? 'is-invalid'">
              <div class="invalid-feedback" th:errors="*{dataHora}"></div>
            </div>
            <div class="col-md-5 mb-3">
              <label class="form-label fw-semibold">Preço (R$) *</label>
              <input type="number" step="0.01" th:field="*{preco}" class="form-control"
                     th:classappend="${#fields.hasErrors('preco')} ? 'is-invalid'">
              <div class="invalid-feedback" th:errors="*{preco}"></div>
            </div>
          </div>

          <div class="alert alert-info small py-2">
            ⚠️ Somente filmes <strong>em cartaz</strong> são listados. A data deve ser <strong>futura</strong>.
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Criar Sessão</button>
            <a th:href="@{/sessoes}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
