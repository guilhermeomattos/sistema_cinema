<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Sessões - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>🕐 Sessões</h2>
      <a th:href="@{/sessoes/nova}" class="btn btn-dark">+ Nova Sessão</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr><th>#</th><th>Filme</th><th>Sala</th><th>Data/Hora</th><th>Preço</th><th>Vagas</th><th>Status</th><th>Ações</th></tr>
          </thead>
          <tbody>
            <tr th:each="s : ${sessoes}">
              <td th:text="${s.id}"></td>
              <td th:text="${s.tituloFilme}"></td>
              <td th:text="'Sala ' + ${s.numeroSala}"></td>
              <td th:text="${#temporals.format(s.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
              <td th:text="'R$ ' + ${#numbers.formatDecimal(s.preco, 1, 'POINT', 2, 'COMMA')}"></td>
              <td>
                <span th:text="${s.assentosDisponiveis} + '/' + ${s.capacidadeSala}"></span>
              </td>
              <td>
                <span th:class="${s.status.name() == 'ABERTA'} ? 'badge bg-success' : (${s.status.name() == 'ENCERRADA'} ? 'badge bg-secondary' : 'badge bg-danger')"
                      th:text="${s.status}"></span>
              </td>
              <td class="d-flex gap-1 flex-wrap">
                <form th:if="${s.status.name() == 'ABERTA'}"
                      th:action="@{/sessoes/{id}/encerrar(id=${s.id})}" method="post" class="d-inline">
                  <button class="btn btn-sm btn-outline-warning">Encerrar</button>
                </form>
                <form th:action="@{/sessoes/{id}/deletar(id=${s.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remover sessão?')">
                  <button class="btn btn-sm btn-outline-danger">Remover</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(sessoes)}">
              <td colspan="8" class="text-center text-muted py-3">Nenhuma sessão cadastrada.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
