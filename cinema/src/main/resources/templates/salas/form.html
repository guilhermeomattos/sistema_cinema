<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Sala - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card shadow-sm" style="max-width:450px;">
      <div class="card-header bg-dark text-white">
        <span th:text="${salaId != null} ? 'Editar Sala' : 'Nova Sala'">Sala</span>
      </div>
      <div class="card-body">
        <form th:action="${salaId != null} ? @{/salas/{id}/editar(id=${salaId})} : @{/salas}"
              th:object="${sala}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Número *</label>
            <input type="number" th:field="*{numero}" class="form-control"
                   th:classappend="${#fields.hasErrors('numero')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{numero}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Capacidade *</label>
            <input type="number" th:field="*{capacidade}" class="form-control"
                   th:classappend="${#fields.hasErrors('capacidade')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{capacidade}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Tipo *</label>
            <select th:field="*{tipo}" class="form-select">
              <option value="">Selecione</option>
              <option th:each="t : ${tiposSala}" th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{tipo}"></div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Salvar</button>
            <a th:href="@{/salas}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
