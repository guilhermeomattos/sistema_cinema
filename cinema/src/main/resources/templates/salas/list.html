<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Salas - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>🏛 Salas</h2>
      <a th:href="@{/salas/nova}" class="btn btn-dark">+ Nova Sala</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr><th>#</th><th>Número</th><th>Capacidade</th><th>Tipo</th><th>Ações</th></tr>
          </thead>
          <tbody>
            <tr th:each="s : ${salas}">
              <td th:text="${s.id}"></td>
              <td th:text="${s.numero}"></td>
              <td th:text="${s.capacidade} + ' lugares'"></td>
              <td><span class="badge bg-dark" th:text="${s.tipo}"></span></td>
              <td>
                <a th:href="@{/salas/{id}/editar(id=${s.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                <form th:action="@{/salas/{id}/deletar(id=${s.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remover sala?')">
                  <button class="btn btn-sm btn-outline-danger">Remover</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(salas)}">
              <td colspan="5" class="text-center text-muted py-3">Nenhuma sala cadastrada.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
