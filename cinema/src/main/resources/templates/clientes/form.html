<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Cliente - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card shadow-sm" style="max-width:550px;">
      <div class="card-header bg-dark text-white">
        <span th:text="${clienteId != null} ? 'Editar Cliente' : 'Novo Cliente'">Cliente</span>
      </div>
      <div class="card-body">
        <form th:action="${clienteId != null} ? @{/clientes/{id}/editar(id=${clienteId})} : @{/clientes}"
              th:object="${cliente}" method="post">

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome *</label>
            <input type="text" th:field="*{nome}" class="form-control"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{nome}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">CPF (11 dígitos, sem pontos) *</label>
            <input type="text" th:field="*{cpf}" class="form-control" maxlength="11"
                   th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{cpf}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Data de Nascimento *</label>
            <input type="date" th:field="*{dataNascimento}" class="form-control"
                   th:classappend="${#fields.hasErrors('dataNascimento')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{dataNascimento}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Tipo de Cliente *</label>
            <select th:field="*{tipoCliente}" class="form-select">
              <option value="">Selecione</option>
              <option th:each="t : ${tiposCliente}" th:value="${t}" th:text="${t}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{tipoCliente}"></div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Salvar</button>
            <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
