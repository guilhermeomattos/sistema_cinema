<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head><meta charset="UTF-8"><title>Clientes - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>👤 Clientes</h2>
      <a th:href="@{/clientes/novo}" class="btn btn-dark">+ Novo Cliente</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr><th>#</th><th>Nome</th><th>CPF</th><th>Nascimento</th><th>Tipo</th><th>Meia?</th><th>Ações</th></tr>
          </thead>
          <tbody>
            <tr th:each="c : ${clientes}">
              <td th:text="${c.id}"></td>
              <td th:text="${c.nome}"></td>
              <td th:text="${c.cpf}"></td>
              <td th:text="${#temporals.format(c.dataNascimento, 'dd/MM/yyyy')}"></td>
              <td><span class="badge bg-info text-dark" th:text="${c.tipoCliente}"></span></td>
              <td>
                <span th:class="${c.temMeiaEntrada} ? 'badge bg-success' : 'badge bg-secondary'"
                      th:text="${c.temMeiaEntrada} ? 'Sim' : 'Não'"></span>
              </td>
              <td>
                <a th:href="@{/clientes/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                <form th:action="@{/clientes/{id}/deletar(id=${c.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remover cliente?')">
                  <button class="btn btn-sm btn-outline-danger">Remover</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clientes)}">
              <td colspan="7" class="text-center text-muted py-3">Nenhum cliente cadastrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
