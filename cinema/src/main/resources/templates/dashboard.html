<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">🎬 MovieSystem</span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-light small">
        Olá, <strong sec:authentication="name">usuário</strong>
      </span>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-light btn-sm">Sair</button>
      </form>
    </div>
  </nav>
  <div class="container mt-5">
    <h2>Bem-vindo ao Sistema de cinema!</h2>
    <p class="text-muted">Login realizado com sucesso. Em breve as demais telas serão implementadas.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
