<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <div class="container mt-4">
    <h2 class="mb-4">📊 Dashboard</h2>

    <!-- Flash message -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- KPI Cards Row 1 -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card border-0 shadow-sm text-white bg-primary h-100">
          <div class="card-body">
            <div class="fs-1 fw-bold" th:text="${totalFilmes}">0</div>
            <div>Total de Filmes</div>
            <small th:text="${filmesEmCartaz} + ' em cartaz'"></small>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card border-0 shadow-sm text-white bg-success h-100">
          <div class="card-body">
            <div class="fs-1 fw-bold" th:text="${totalClientes}">0</div>
            <div>Clientes Cadastrados</div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card border-0 shadow-sm text-white bg-warning h-100">
          <div class="card-body">
            <div class="fs-1 fw-bold" th:text="${totalSessoes}">0</div>
            <div>Sessões</div>
            <small th:text="${sessoesAbertas} + ' abertas'"></small>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card border-0 shadow-sm text-white bg-danger h-100">
          <div class="card-body">
            <div class="fs-1 fw-bold" th:text="${totalReservas}">0</div>
            <div>Reservas</div>
            <small th:text="${reservasConfirmadas} + ' confirmadas'"></small>
          </div>
        </div>
      </div>
    </div>

    <!-- Receita Total -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm bg-dark text-white">
          <div class="card-body">
            <h5 class="card-title">💰 Receita Total</h5>
            <div class="fs-3 fw-bold"
                 th:text="'R$ ' + ${#numbers.formatDecimal(receitaTotal, 1, 'POINT', 2, 'COMMA')}">
              R$ 0,00
            </div>
            <small class="text-muted">somente reservas confirmadas</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Últimas Reservas -->
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">🎟 Últimas Reservas</div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr>
              <th>#</th><th>Cliente</th><th>Filme</th>
              <th>Data da Sessão</th><th>Status</th><th>Valor</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="r : ${ultimasReservas}">
              <td th:text="${r.id}"></td>
              <td th:text="${r.nomeCliente}"></td>
              <td th:text="${r.tituloFilme}"></td>
              <td th:text="${#temporals.format(r.dataHoraSessao, 'dd/MM/yyyy HH:mm')}"></td>
              <td>
                <span th:class="${r.status.name() == 'CONFIRMADA'} ? 'badge bg-success' : (${r.status.name() == 'CANCELADA'} ? 'badge bg-danger' : 'badge bg-secondary')"
                      th:text="${r.status}"></span>
              </td>
              <td th:text="'R$ ' + ${#numbers.formatDecimal(r.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(ultimasReservas)}">
              <td colspan="6" class="text-center text-muted py-3">Nenhuma reserva cadastrada.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
