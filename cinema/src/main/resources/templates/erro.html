<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Erro - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-5">
    <div class="alert alert-danger shadow-sm">
      <h4 class="alert-heading">⚠️ Ocorreu um erro</h4>
      <p th:text="${erro}">Erro desconhecido.</p>
      <hr>
      <a th:href="@{/dashboard}" class="btn btn-dark btn-sm">Voltar ao Dashboard</a>
    </div>
  </div>
</body>
</html>
